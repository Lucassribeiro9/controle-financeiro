{# Componente de estado vazio (empty state) reutilizável #}
{# Parâmetros: title, description, cta_label (opcional), cta_url (opcional) #}

<div class="home-empty-action">
    <div>
        <strong>{{ title }}</strong>
        <span>{{ description }}</span>
    </div>
    {% if cta_label and cta_url %}
        <a class="button button-secondary" href="{{ cta_url }}">
            {{ cta_label }}
        </a>
    {% endif %}
</div>
