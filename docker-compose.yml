services:
  web:
    build:
      context: .
      dockerfile: DOCKERFILE
    container_name: controle-financeiro-web
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      DJANGO_SETTINGS_MODULE: project.settings
    restart: unless-stopped
